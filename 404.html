<!DOCTYPE html>
<html lang="en">
<head>

    <title>Tool Not Found | Donkey Jaw Services</title>
    <style>
        :root {
            --bg-main:  #263E5C;
            --text-main: #d1d1d1;
            --brand-gold: #D4AF37;

            --border-color: #333333;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;

        }

        h1 { 
            color: var(--brand-gold); 
            font-size: 5em; 
            margin: 0; 
        }

        h2 { 
            text-transform: uppercase; 
            letter-spacing: 3px;

        }

        p {

            margin-bottom: 30px; 
            color: #888;
        }

        .btn-home {

            background: var(--brand-action);
            color: #000;
            text-decoration: none;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .btn-home:hover {
            background: var(--brand-gold);

</head>
